name: Deploy para Hostinger

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar e validar frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test:run

      - name: Gerar frontend para /frontend/
        working-directory: frontend
        run: npm run build -- --base=/frontend/

      - name: Deploy da aplicacao PHP via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/CLAUDE.md
            **/README.md
            **/ROADMAP.md
            **/config.example.php
            frontend/**
            uploads/**

      - name: Deploy do frontend React via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: frontend/dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}frontend/
          state-name: .ftp-deploy-sync-state-frontend.json
