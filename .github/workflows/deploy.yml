name: Deploy para Hostinger

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  quality-gate:
    uses: ./.github/workflows/tests.yml

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production
    concurrency:
      group: production-ftps
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar frontend
        working-directory: frontend
        run: npm ci

      - name: Gerar frontend para a raiz publica
        working-directory: frontend
        run: npm run build

      - name: Deploy da aplicacao PHP via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.agents/**
            **/.claude/**
            **/.codex/**
            **/.serena/**
            **/.vscode/**
            **/CLAUDE.md
            **/README.md
            **/ROADMAP.md
            **/config.example.php
            automation/**
            config/**
            docs/**
            frontend/**
            migrations/**
            scripts/**
            tests/**
            tmp/**
            uploads/**
            schema.sql

      - name: Deploy do frontend React na raiz via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: frontend/dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state-frontend.json
