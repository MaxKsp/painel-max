name: Testes automatizados

on:
  pull_request:
    branches: [master]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Testes JS e PHP
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, mbstring, json, sodium
          coverage: none

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Criar config.php de teste
        shell: bash
        run: cp config.example.php config.php

      - name: Validar sintaxe de todos os arquivos PHP versionados
        shell: bash
        run: |
          set -e
          files=()
          while IFS= read -r -d '' f; do
            files+=("$f")
          done < <(git ls-files -z -- '*.php')

          if [ "${#files[@]}" -eq 0 ]; then
            echo "Nenhum arquivo PHP versionado foi encontrado." >&2
            exit 1
          fi

          for f in "${files[@]}"; do
            echo "Validando: $f"
            php -l "$f"
          done

      - name: Validar sintaxe de todos os arquivos JavaScript versionados
        shell: bash
        run: |
          set -e
          files=()
          while IFS= read -r -d '' f; do
            files+=("$f")
          done < <(git ls-files -z -- '*.js')

          if [ "${#files[@]}" -eq 0 ]; then
            echo "Nenhum arquivo JavaScript versionado foi encontrado." >&2
            exit 1
          fi

          for f in "${files[@]}"; do
            echo "Validando: $f"
            node --check "$f"
          done

      - name: Rodar testes JS (tests/js/*_test.js)
        run: |
          set -e
          for f in tests/js/*_test.js; do
            echo "== $f =="
            node "$f"
          done

      - name: Rodar testes PHP (tests/run.php)
        run: php tests/run.php
